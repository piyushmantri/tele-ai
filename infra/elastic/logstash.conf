input { beats { port => 5044 } }

filter {
  # Parse JSON log lines (tele server: {"t":"...","level":"...","msg":"..."})
  json {
    source => "message"
    target => "parsed"
    skip_on_invalid_json => true
  }

  if [parsed][t] {
    date { match => ["[parsed][t]", "ISO8601"] target => "@timestamp" }
    mutate {
      rename => { "[parsed][level]" => "level" }
      rename => { "[parsed][msg]"   => "log_msg" }
      remove_field => ["parsed"]
    }
  } else {
    mutate { remove_field => ["parsed"] }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "tele-logs-%{+YYYY.MM.dd}"
  }
}
